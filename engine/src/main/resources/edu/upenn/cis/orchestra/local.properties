# Apply SQL to DBMS
apply=true

# Put multiple queries in one batch
batch=false

# Use autocommit
autocommit=true

# Create deletion rules
delete=true

# Debug mode
debug=true

# Create insertion rules
insert=true

# Do incremental maintenance (false overrides insert, delete options)
incremental=true

# Create outer unions, versus individual mapping relations
#outerunion=false
outerunion=false

# Create outer joins, for paths of mappings
outerjoin=false

# Prepare statements before executing
prepare=false

# Reset the tables at the end
reset=true

# Put rules with the same body in one union query
union=false

# Index all fields
indexall=true

# URL for DB2 server
db2server=jdbc:db2:SIGMOD

# local dbname
dbname=SIGMOD

# Username for DB2
db2user=gkarvoun

# Password for DB2
db2pwd=GREG#00

# Database server version
DBMSversion=9.1

# Schema file prefix
#schema=bioSimpleG
#schema=bioSimpleGSkolemTest
